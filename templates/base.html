<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <script>
    const stored = localStorage.getItem('theme')
    const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches
    const isDark = stored === 'dark' || (!stored && prefersDark)
    if (isDark) document.documentElement.classList.add('dark')

    function updateSyntax() {
      const dark = document.documentElement.classList.contains('dark')
      document.getElementById('syntax-light').disabled = dark
      document.getElementById('syntax-dark').disabled = !dark
    }
    document.addEventListener('DOMContentLoaded', updateSyntax)
  </script>
  <link rel="stylesheet" href="{{ get_url(path='style.css') | safe }}">
  <link rel="stylesheet" href="{{ get_url(path='giallo-light.css') | safe }}" id="syntax-light">
  <link rel="stylesheet" href="{{ get_url(path='giallo-dark.css') | safe }}" id="syntax-dark">
</head>
<body>
  <header>
    <nav>
      <a href="{{ get_url(path='/') }}" class="site-title">{{ config.title }}</a>
      <ul>
        {% set root = get_section(path="_index.md") %}
        {% for section_path in root.subsections %}
          {% set s = get_section(path=section_path) %}
          <li><a href="{{ s.permalink }}">{{ s.title }}</a></li>
        {% endfor %}
      </ul>
      <button class="theme-toggle" onclick="
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        updateSyntax()
      " aria-label="Toggle theme">
        <span class="light-icon">☀️</span>
        <span class="dark-icon">🌙</span>
      </button>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Built with stubbornness and static HTML.</p>
  </footer>
</body>
</html>
