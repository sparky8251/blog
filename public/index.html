<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Go Deeper, Not Wider</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Understanding computers the way they actually work">
  <script>
    const stored = localStorage.getItem('theme')
    const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches
    const isDark = stored === 'dark' || (!stored && prefersDark)
    if (isDark) document.documentElement.classList.add('dark')

    function updateSyntax() {
      const dark = document.documentElement.classList.contains('dark')
      document.getElementById('syntax-light').disabled = dark
      document.getElementById('syntax-dark').disabled = !dark
    }
    document.addEventListener('DOMContentLoaded', updateSyntax)
  </script>
  <link rel="stylesheet" href="https://sparky8251.github.io/blog/style.css">
  <link rel="stylesheet" href="https://sparky8251.github.io/blog/giallo-light.css" id="syntax-light">
  <link rel="stylesheet" href="https://sparky8251.github.io/blog/giallo-dark.css" id="syntax-dark">
</head>
<body>
  <header>
    <nav>
      <a href="https://sparky8251.github.io/blog" class="site-title">Go Deeper, Not Wider</a>
      <ul>
        
        
          
          <li><a href="https:&#x2F;&#x2F;sparky8251.github.io&#x2F;blog&#x2F;understanding-linux&#x2F;">Understanding Linux</a></li>
        
      </ul>
      <button class="theme-toggle" onclick="
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        updateSyntax()
      " aria-label="Toggle theme">
        <span class="light-icon">☀️</span>
        <span class="dark-icon">🌙</span>
      </button>
    </nav>
  </header>

  <main>
    
<h1>Go Deeper, Not Wider</h1>

<p class="tagline">Understanding computers the way they actually work</p>

<section class="series-list">
  
    
    <article class="series-card">
      <h2><a href="https:&#x2F;&#x2F;sparky8251.github.io&#x2F;blog&#x2F;understanding-linux&#x2F;">Understanding Linux</a></h2>
      <p>Strange solutions to common problems with deep dives into the causes</p>
      
      
        <p class="post-count">1 post</p>
      
    </article>
  
</section>

  </main>

  <footer>
    <p>Built with stubbornness and static HTML.</p>
  </footer>
</body>
</html>
